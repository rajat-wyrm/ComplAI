name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Syntax And Import Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend smoke dependencies
        run: >-
          python -m pip install
          fastapi==0.104.1
          "uvicorn[standard]==0.24.0"
          python-multipart==0.0.6
          sqlalchemy==2.0.23
          asyncpg==0.29.0
          redis==5.0.1
          openai==1.30.5
          python-dotenv==1.0.0
          pydantic==2.5.0
          pydantic-settings==2.1.0
          tenacity==8.2.3
          websockets==12.0
          cachetools==5.5.2
          email-validator==2.2.0
          "passlib[bcrypt]==1.7.4"
          "python-jose[cryptography]==3.3.0"
          filetype==1.2.0
          pymongo==4.9.2

      - name: Compile backend sources
        run: python -m compileall app main.py

      - name: Import backend app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aicompliance
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key
        run: python -c "import main; print(main.app.title)"

  frontend_container:
    name: Frontend Container Build
    runs-on: ubuntu-latest
    needs:
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile .
        working-directory: frontend

  compose:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs:
      - backend
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config
