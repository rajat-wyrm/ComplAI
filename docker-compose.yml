version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=
      - REDIS_URL=
      - DEEPSEEK_API_KEY=
      - OPENAI_API_KEY=
      - HUGGINGFACE_API_KEY=
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vectors:/app/vectors
      - ./backend/logs:/app/logs
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
